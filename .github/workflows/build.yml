name: Build and Release
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            librsvg2-dev patchelf libssl-dev libayatana-appindicator3-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci
      - run: npx tsc --noEmit
      # - name: cargo check
      #   working-directory: src-tauri
      #   run: cargo check

  build-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Generate icons from source
        run: npx tauri icon src-tauri/icon.png

      - name: Build universal binary
        run: |
          npx tauri build --target=universal-apple-darwin --bundles=dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: serbase-macos-universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  build-linux:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            librsvg2-dev patchelf libssl-dev libayatana-appindicator3-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Generate icons from source
        run: npx tauri icon src-tauri/icon.png

      - run: npx tauri build --bundles deb,appimage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: serbase-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-android:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            librsvg2-dev patchelf libssl-dev libayatana-appindicator3-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Generate icons from source
        run: npx tauri icon src-tauri/icon.png

      - name: setup Android signing
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build APK
        run: npx tauri android build --target=aarch64

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: serbase-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  build-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint]
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            label: amd64
          - target: aarch64-pc-windows-msvc
            label: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Generate icons from source
        run: npx tauri icon src-tauri/icon.png

      - name: Install cargo-xwin
        run: cargo install --locked cargo-xwin

      - name: Build installer
        run: npx tauri build --runner cargo-xwin --target ${{ matrix.target }} --bundles nsis

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: serbase-windows-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux, build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            serbase-macos-universal/**/*.dmg
            serbase-linux/**/*.deb
            serbase-linux/**/*.AppImage
            serbase-android/**/*.apk
            serbase-windows-amd64/**/*.exe
            serbase-windows-arm64/**/*.exe
          generate_release_notes: true
